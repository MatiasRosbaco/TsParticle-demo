<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laboratorio de Partículas · TsParticle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Layer 0: tsParticles ambient background -->
    <div id="bg-particles"></div>

    <!-- Layer 1: Text particle canvas -->
    <canvas id="text-canvas"></canvas>

    <!-- Layer 2: Cursor influence ring -->
    <canvas id="cursor-canvas"></canvas>

    <!-- Layer 3: UI hints (pointer-events: none) -->
    <div id="ui">
      <div id="hint-top">LABORATORIO DE PARTÍCULAS</div>
      <div id="hint-bottom">
        <span id="hint-repulse">↖ Mueve el mouse · Las partículas huyen</span>
        <span id="hint-attract">Mantén clic · Las partículas obedecen</span>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
